trigger:
  branches:
    include:
      - main
  paths:
    include:
      - source/*
    exclude:
      - CHANGELOG.md
  tags:
    include:
      - "v*"
    exclude:
      - "*-*"

pr:
  branches:
    include:
      - main
  paths:
    include:
      - source/*

variables:
  buildFolderName: output
  buildArtifactName: output
  testResultFolderName: testResults
  testArtifactName: testResults
  sourceFolderName: source
  defaultBranch: main
  Agent.Source.Git.ShallowFetchDepth: 0

stages:
  #---------------------------------------------------------------------------
  # Stage 1: Build
  #---------------------------------------------------------------------------
  - stage: Build
    jobs:
      - job: Package_Module
        displayName: "Package Module"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - pwsh: |
              dotnet tool install --global GitVersion.Tool --version 5.*
              $gitVersionObject = dotnet-gitversion | ConvertFrom-Json
              $gitVersionObject.PSObject.Properties.ForEach{
                  Write-Host -Object "Setting Task Variable '$($_.Name)' with value '$($_.Value)'."
                  Write-Host -Object "##vso[task.setvariable variable=$($_.Name);]$($_.Value)"
              }
              Write-Host -Object "##vso[build.updatebuildnumber]$($gitVersionObject.FullSemVer)"
            displayName: Calculate ModuleVersion (GitVersion)

          - task: PowerShell@2
            name: package
            displayName: "Build & Package Module"
            inputs:
              filePath: "./build.ps1"
              arguments: "-ResolveDependency -tasks pack"
              pwsh: true
            env:
              ModuleVersion: $(NuGetVersionV2)

          - task: PublishPipelineArtifact@1
            displayName: "Publish Build Artifact"
            inputs:
              targetPath: "$(buildFolderName)/"
              artifact: $(buildArtifactName)
              publishLocation: "pipeline"
              parallel: true

  #---------------------------------------------------------------------------
  # Stage 2: Test (Windows only - PS 5.1 + PS 7.x via matrix)
  #---------------------------------------------------------------------------
  - stage: Test
    dependsOn: Build
    jobs:
      - job: Test_Unit
        displayName: "Unit"
        pool:
          vmImage: "windows-latest"
        strategy:
          matrix:
            Windows_PowerShell_5_1:
              testTitle: "Unit (Windows PowerShell 5.1)"
              isPwsh: "false"
            PowerShell_7:
              testTitle: "Unit (PowerShell 7.x)"
              isPwsh: "true"
        timeoutInMinutes: 0
        steps:
          - task: DownloadPipelineArtifact@2
            displayName: "Download Build Artifact"
            inputs:
              buildType: "current"
              artifactName: $(buildArtifactName)
              targetPath: "$(Build.SourcesDirectory)/$(buildFolderName)"

          - task: PowerShell@2
            name: test
            displayName: "Run Unit Test"
            inputs:
              filePath: "./build.ps1"
              arguments: "-Tasks test"
              pwsh: $(isPwsh)

          - task: PublishTestResults@2
            displayName: "Publish Test Results"
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: "NUnit"
              testResultsFiles: "$(buildFolderName)/$(testResultFolderName)/NUnit*.xml"
              testRunTitle: "$(testTitle)"

          - task: PublishPipelineArtifact@1
            displayName: "Publish Test Artifact"
            condition: and(succeededOrFailed(), eq(variables.isPwsh, 'true'))
            inputs:
              targetPath: "$(buildFolderName)/$(testResultFolderName)/"
              artifactName: $(testArtifactName)
              parallel: true

      - job: Code_Coverage
        displayName: "Publish Code Coverage"
        dependsOn: Test_Unit
        pool:
          vmImage: "ubuntu-latest"
        timeoutInMinutes: 0
        steps:
          - pwsh: |
              $repositoryOwner,$repositoryName = $env:BUILD_REPOSITORY_NAME -split '/'
              echo "##vso[task.setvariable variable=RepositoryOwner;isOutput=true]$repositoryOwner"
              echo "##vso[task.setvariable variable=RepositoryName;isOutput=true]$repositoryName"
            name: dscBuildVariable
            displayName: "Set Environment Variables"

          - task: DownloadPipelineArtifact@2
            displayName: "Download Build Artifact"
            inputs:
              buildType: "current"
              artifactName: $(buildArtifactName)
              targetPath: "$(Build.SourcesDirectory)/$(buildFolderName)"

          - task: DownloadPipelineArtifact@2
            displayName: "Download Test Artifact"
            inputs:
              buildType: "current"
              artifactName: $(testArtifactName)
              targetPath: "$(Build.SourcesDirectory)/$(buildFolderName)/$(testResultFolderName)"

          - task: PublishCodeCoverageResults@2
            displayName: "Publish Code Coverage to Azure DevOps"
            inputs:
              summaryFileLocation: "$(Build.SourcesDirectory)/$(buildFolderName)/$(testResultFolderName)/JaCoCo_coverage.xml"
              pathToSources: "$(Build.SourcesDirectory)/$(sourceFolderName)/"

  #---------------------------------------------------------------------------
  # Stage 3a: Deploy Preview (main branch only)
  #---------------------------------------------------------------------------
  - stage: Deploy_Preview
    displayName: "Deploy Preview"
    dependsOn: Test
    condition: |
      and(
        succeeded(),
        eq(variables['Build.SourceBranch'], 'refs/heads/main'),
        contains(variables['System.TeamFoundationCollectionUri'], 'fam-tiedemann')
      )
    jobs:
      - job: Deploy_Preview_Module
        displayName: "Publish Preview to PSGallery"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: DownloadPipelineArtifact@2
            displayName: "Download Pipeline Artifact"
            inputs:
              buildType: "current"
              artifactName: $(buildArtifactName)
              targetPath: "$(Build.SourcesDirectory)/$(buildArtifactName)"

          - task: PowerShell@2
            name: publishPreview
            displayName: "Publish Preview to PSGallery"
            inputs:
              filePath: "./build.ps1"
              arguments: "-tasks publish_module_to_gallery"
              pwsh: true
            env:
              GalleryApiToken: $(GalleryApiToken)
              ReleaseBranch: $(defaultBranch)
              MainGitBranch: $(defaultBranch)

  #---------------------------------------------------------------------------
  # Stage 3b: Deploy Release (tag only)
  #---------------------------------------------------------------------------
  - stage: Deploy_Release
    displayName: "Deploy Release"
    dependsOn: Test
    condition: |
      and(
        succeeded(),
        startsWith(variables['Build.SourceBranch'], 'refs/tags/'),
        contains(variables['System.TeamFoundationCollectionUri'], 'fam-tiedemann')
      )
    jobs:
      - job: Deploy_Release_Module
        displayName: "Deploy Release"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - task: DownloadPipelineArtifact@2
            displayName: "Download Pipeline Artifact"
            inputs:
              buildType: "current"
              artifactName: $(buildArtifactName)
              targetPath: "$(Build.SourcesDirectory)/$(buildArtifactName)"

          - task: PowerShell@2
            name: publishRelease
            displayName: "Publish Release"
            inputs:
              filePath: "./build.ps1"
              arguments: "-tasks publish"
              pwsh: true
            env:
              GitHubToken: $(GitHubToken)
              GalleryApiToken: $(GalleryApiToken)
              ReleaseBranch: $(defaultBranch)
              MainGitBranch: $(defaultBranch)

          - task: PowerShell@2
            name: sendChangelogPR
            displayName: "Send Changelog PR"
            inputs:
              filePath: "./build.ps1"
              arguments: "-tasks Create_ChangeLog_GitHub_PR"
              pwsh: true
            env:
              GitHubToken: $(GitHubToken)
              ReleaseBranch: $(defaultBranch)
              MainGitBranch: $(defaultBranch)